<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Premium Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary: #f39c12; --bg-overlay: rgba(13, 17, 23, 0.9); --card-bg: rgba(28, 33, 40, 0.95); --text-main: white; }
        body { background: #0d1117 url('https://img.etimg.com/thumb/msid-100224422,width-1200,height-900,resizemode-4,imgsize-86314/online-cricket-betting-apps-legal-cricket-betting-scams.jpg') no-repeat center center fixed; background-size: cover; color: var(--text-main); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; position: relative; }
        
        /* Dark overlay to make text pop */
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-overlay); z-index: -1; }
        
        /* Layout */
        .container { position: relative; z-index: 1; padding-top: 50px; }
        .logo { color: var(--primary); font-size: 36px; font-weight: bold; font-style: italic; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #444; max-width: 380px; margin: auto; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }

        /* Auth Tabs & Inputs */
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #555; }
        .tab { flex: 1; padding: 12px; cursor: pointer; color: #aaa; font-weight: bold; text-transform: uppercase; font-size: 14px; transition: 0.3s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        input { width: 90%; padding: 14px; margin: 12px 0; background: rgba(0, 0, 0, 0.7); border: 1px solid #555; color: var(--primary); border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(243, 156, 18, 0.5); }

        /* Buttons & Dashboard */
        .btn { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .btn:hover { background: #e67e22; }
        #app-screen { display: none; text-align: center; }
        .dashboard-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); max-width: 450px; margin: 50px auto auto; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); }
        .wallet-display { font-size: 32px; font-weight: bold; color: var(--primary); background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed var(--primary); }
        .logout-btn { background: #333; color: white; padding: 12px 20px; border-radius: 8px; border: 1px solid #555; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .logout-btn:hover { background: #ff5252; border-color: #ff5252; }
        .status-msg { display: none; color: var(--primary); margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">PANDYA BET</div>

        <div id="auth-screen">
            <div class="box">
                <div class="tabs">
                    <div id="l-tab" class="tab active" onclick="switchTab('login')">LOGIN</div>
                    <div id="s-tab" class="tab" onclick="switchTab('signup')">SIGN UP</div>
                </div>
                
                <input type="number" id="phone" placeholder="Mobile Number">
                <input type="password" id="pass" placeholder="Password">
                
                <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
                
                <button id="authBtn" class="btn" onclick="handleAuth()">LOGIN NOW</button>
                <div id="status" class="status-msg">Wait... Connecting...</div>
            </div>
        </div>

        <div id="app-screen">
            <div class="dashboard-box">
                <h2>WELCOME TO LOBBY</h2>
                <p style="font-size: 18px; color: #ccc;">User ID: <span id="display-id" style="color:var(--primary); font-weight:bold;"></span></p>
                
                <div class="wallet-display">
                    Wallet: ₹<span id="display-bal">1000.00</span>
                </div>
                
                <p style="color: #888;">Aviator, Color Trading & Live Matches loading...</p>
                
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mode = 'login';

        // Auto-Login Check on Refresh
        window.onload = () => {
            const user = localStorage.getItem('pandya_user');
            if(user) showDashboard(user);
        };

        function switchTab(m) {
            mode = m;
            document.getElementById('l-tab').className = m === 'login' ? 'tab active' : 'tab';
            document.getElementById('s-tab').className = m === 'signup' ? 'tab active' : 'tab';
            document.getElementById('c-pass').style.display = m === 'signup' ? 'block' : 'none';
            document.getElementById('authBtn').innerText = m === 'login' ? 'LOGIN NOW' : 'CREATE ACCOUNT';
        }

        async function handleAuth() {
            const p = document.getElementById('phone').value.trim();
            const pw = document.getElementById('pass').value.trim();
            const cpw = document.getElementById('c-pass').value.trim();
            const status = document.getElementById('status');

            if(!p || !pw) return alert("Pehle details bharo bhai!");

            status.style.display = 'block';

            if(mode === 'signup') {
                if(pw !== cpw) { status.style.display = 'none'; return alert("Password match nahi hua!"); }
                db.ref('users/' + p).set({ password: pw, wallet: 1000 })
                .then(() => { status.style.display = 'none'; alert("Account Ban Gaya! Ab Login karein."); switchTab('login'); })
                .catch(e => { status.style.display = 'none'; alert("Error: " + e.message); });
            } else {
                db.ref('users/' + p).once('value').then((snap) => {
                    status.style.display = 'none';
                    if(snap.exists() && snap.val().password === pw) {
                        localStorage.setItem('pandya_user', p);
                        showDashboard(p);
                    } else { alert("Wrong ID or Password!"); }
                });
            }
        }

        function showDashboard(p) {
            db.ref('users/' + p).on('value', (snap) => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('display-id').innerText = p;
                document.getElementById('display-bal').innerText = parseFloat(snap.val().wallet).toFixed(2);
            });
        }

        function logout() { localStorage.removeItem('pandya_user'); location.reload(); }
    </script>
</body>
</html>
