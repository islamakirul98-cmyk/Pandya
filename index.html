<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --gold: #f39c12;
            --dark-bg: #0b0e14;
            --card-bg: rgba(23, 27, 34, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Premium Dark Gradient - No external Image needed */
            background: radial-gradient(circle at center, #1a2a3a 0%, #0b0e14 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Stadium Light Effect */
        body::before {
            content: '';
            position: absolute;
            top: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(243,156,18,0.05) 0%, rgba(0,0,0,0) 50%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 380px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(243, 156, 18, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 38px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(243, 156, 18, 0.4);
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            color: #888;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--gold);
            color: black;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #333;
            color: var(--gold);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--gold);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        /* Dashboard Look */
        #app-screen { display: none; }
        .wallet-box {
            background: linear-gradient(135deg, #1c2128 0%, #000 100%);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-card">
        <div class="logo">PANDYA BET</div>
        
        <div class="tabs">
            <div id="l-tab" class="tab active" onclick="setTab('login')">LOGIN</div>
            <div id="s-tab" class="tab" onclick="setTab('signup')">SIGN UP</div>
        </div>

        <input type="number" id="phone" placeholder="Mobile Number">
        <input type="password" id="pass" placeholder="Password">
        <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">

        <button class="main-btn" onclick="handleAuth()" id="btnText">LOGIN NOW</button>
    </div>

    <div id="app-screen" class="auth-card">
        <div class="logo">PANDYA BET</div>
        <h3>DASHBOARD</h3>
        <p style="color:#888;">ID: <span id="u-id" style="color:white;"></span></p>
        
        <div class="wallet-box">
            <span style="font-size:14px; color:#aaa;">Balance</span><br>
            <span style="font-size:32px; font-weight:bold; color:var(--gold);">₹ <span id="u-bal">0.00</span></span>
        </div>

        <button class="main-btn" style="background:#333; color:white;" onclick="logout()">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mode = 'login';

        window.onload = () => {
            const user = localStorage.getItem('p_user');
            if(user) loadDashboard(user);
        };

        function setTab(m) {
            mode = m;
            document.getElementById('l-tab').className = m==='login' ? 'tab active' : 'tab';
            document.getElementById('s-tab').className = m==='signup' ? 'tab active' : 'tab';
            document.getElementById('c-pass').style.display = m==='signup' ? 'block' : 'none';
            document.getElementById('btnText').innerText = m==='login' ? 'LOGIN NOW' : 'CREATE ACCOUNT';
        }

        function handleAuth() {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            const cpw = document.getElementById('c-pass').value;

            if(!p || !pw) return alert("Details bharo bhai!");

            if(mode === 'signup') {
                if(pw !== cpw) return alert("Password match nahi hua!");
                db.ref('users/' + p).set({ password: pw, wallet: 1000 })
                .then(() => { alert("Signup Ho Gaya! Ab Login Karo."); setTab('login'); });
            } else {
                db.ref('users/' + p).once('value').then(snap => {
                    if(snap.exists() && snap.val().password === pw) {
                        localStorage.setItem('p_user', p);
                        loadDashboard(p);
                    } else { alert("Wrong ID or Password!"); }
                });
            }
        }

        function loadDashboard(p) {
            db.ref('users/' + p).on('value', snap => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('u-id').innerText = p;
                document.getElementById('u-bal').innerText = parseFloat(snap.val().wallet).toFixed(2);
            });
        }

        function logout() { localStorage.removeItem('p_user'); location.reload(); }
    </script>
</body>
</html>
