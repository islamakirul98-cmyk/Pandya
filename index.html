<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; --card: #1c2128; --red: #e74c3c; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Loading Prevention */
        #auth-screen, #app-screen { display: none; }

        /* Header & Sidebar */
        .header { background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(243, 156, 18, 0.2); position: sticky; top: 0; z-index: 100; }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--gold); }
        .wallet-badge { background: #000; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer; }
        
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }

        /* Main Lobby */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .game-item { background: var(--card); border-radius: 15px; padding: 25px 10px; border: 1px solid #333; cursor: pointer; text-align: center; font-weight: bold; }
        
        /* Aviator Special */
        #aviator-area { background: #000; height: 180px; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #333; margin: 15px 0; }
        #multiplier { font-size: 40px; font-weight: bold; color: var(--gold); padding-top: 50px; }
        #plane { position: absolute; bottom: 20px; left: 10px; font-size: 30px; transition: 0.1s linear; }

        /* Auth */
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 90%; max-width: 350px; margin: auto; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 10px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .game-window { display: none; padding: 20px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 25px; border-radius: 8px; font-weight: bold; z-index: 3000; transition: 0.5s; }
        #custom-alert.show { top: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert">Message</div>
    <div class="overlay-bg" id="menu-overlay" onclick="closeMenu()"></div>

    <div class="side-menu" id="side-nav">
        <h2 style="color: var(--gold);">MENU</h2>
        <div class="menu-item" onclick="openGame('deposit-page'); closeMenu();">💰 Deposit</div>
        <div class="menu-item" onclick="openGame('withdraw-page'); closeMenu();">🏦 Withdraw</div>
        <div class="menu-item" onclick="userLogout()" style="color: var(--red); margin-top: 50px;">🚪 Logout</div>
    </div>

    <div id="auth-screen" style="height:100vh; display:flex; align-items:center;">
        <div class="auth-box">
            <h1 style="color: var(--gold); font-style: italic;">PANDYA BET</h1>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Login / Sign Up</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="menu-icon" onclick="toggleMenu()">☰</div>
                <div style="font-weight: bold; color: var(--gold);">PANDYA BET</div>
            </div>
            <div class="wallet-badge" onclick="openGame('deposit-page')">₹ <span id="u-bal">0.00</span></div>
        </div>

        <div class="container" id="lobby">
            <div class="game-grid">
                <div class="game-item" onclick="openGame('aviator-game')">🚀<br>AVIATOR</div>
                <div class="game-item" onclick="openGame('color-game')">🎨<br>WIN GO</div>
            </div>
        </div>

        <div class="game-window" id="aviator-game">
            <button onclick="backToLobby()" style="float:left; background:none; border:none; color:white;">← Back</button>
            <h2 style="color:var(--red);">🚀 AVIATOR</h2>
            <div id="aviator-area"><div id="multiplier">1.00x</div><div id="plane">✈️</div></div>
            <input type="number" id="avi-amt" placeholder="Bet Amount">
            <button id="start-avi" class="btn" style="background:var(--red); color:white;" onclick="startAviator()">Bet & Start</button>
            <button id="cashout-avi" class="btn" style="background:var(--green); color:white; display:none;" onclick="cashOutAviator()">Cash Out</button>
        </div>

        <div class="game-window" id="color-game">
            <button onclick="backToLobby()" style="float:left; background:none; border:none; color:white;">← Back</button>
            <h2 style="color:var(--gold);">🎨 WIN GO</h2>
            <div style="background:#000; padding:20px; border-radius:15px; border:1px solid #444;">
                <p>Timer: <span id="timer" style="color:var(--gold); font-size:24px;">15</span>s</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:var(--green); color:white;" onclick="showNotify('Coming Soon!')">Green</button>
                    <button class="btn" style="background:var(--red); color:white;" onclick="showNotify('Coming Soon!')">Red</button>
                </div>
            </div>
        </div>

        <div class="game-window" id="deposit-page">
            <button onclick="backToLobby()" style="background:none; border:none; color:white;">← Back</button>
            <h2>DEPOSIT</h2>
            <div style="background:white; width:180px; height:180px; margin:20px auto; border-radius:10px; color:black; padding-top:75px;">QR CODE</div>
            <input type="number" id="dep-amt" placeholder="Amount"><input type="text" id="dep-utr" placeholder="UTR Number">
            <button class="btn" style="background:var(--green); color:black;" onclick="showNotify('Request Sent!')">Submit</button>
        </div>

        <div class="game-window" id="withdraw-page">
            <button onclick="backToLobby()" style="background:none; border:none; color:white;">← Back</button>
            <h2>WITHDRAW</h2>
            <input type="number" id="wit-amt" placeholder="Amount"><input type="text" id="wit-upi" placeholder="UPI ID">
            <button class="btn" style="background:var(--red); color:white;" onclick="showNotify('Request Sent!')">Request</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let loggedUser = "", isFlying = false, multi = 1.0, aviInt;

        function showNotify(msg) {
            const a = document.getElementById('custom-alert');
            a.innerText = msg; a.classList.add('show');
            setTimeout(() => a.classList.remove('show'), 3000);
        }

        const checkSession = () => {
            const u = localStorage.getItem('p_user');
            if(u) {
                loggedUser = u;
                db.ref('users/'+u).on('value', s => {
                    if(s.exists()) {
                        document.getElementById('u-bal').innerText = parseFloat(s.val().wallet).toFixed(2);
                        document.getElementById('app-screen').style.display = 'block';
                        document.getElementById('auth-screen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        };
        window.onload = checkSession;

        function handleAuth() {
            const p = document.getElementById('phone').value, pw = document.getElementById('pass').value;
            if(!p || !pw) return showNotify("Enter details!");
            db.ref('users/'+p).once('value', s => {
                if(s.exists()){
                    if(s.val().password === pw) { localStorage.setItem('p_user', p); checkSession(); }
                    else showNotify("Wrong password!");
                } else {
                    db.ref('users/'+p).set({password:pw, wallet:20}).then(() => {
                        localStorage.setItem('p_user', p); checkSession();
                    });
                }
            });
        }

        // NAVIGATION
        function toggleMenu() { document.getElementById('side-nav').classList.add('active'); document.getElementById('menu-overlay').style.display='block'; }
        function closeMenu() { document.getElementById('side-nav').classList.remove('active'); document.getElementById('menu-overlay').style.display='none'; }
        function openGame(id) { document.getElementById('lobby').style.display='none'; document.querySelectorAll('.game-window').forEach(w=>w.style.display='none'); document.getElementById(id).style.display='block'; }
        function backToLobby() { document.querySelectorAll('.game-window').forEach(w=>w.style.display='none'); document.getElementById('lobby').style.display='block'; }
        function userLogout() { localStorage.removeItem('p_user'); location.reload(); }

        // AVIATOR
        function startAviator() {
            const amt = parseFloat(document.getElementById('avi-amt').value), bal = parseFloat(document.getElementById('u-bal').innerText);
            if(amt > bal || !amt) return showNotify("Check Balance!");
            db.ref('users/'+loggedUser+'/wallet').set(bal - amt);
            isFlying = true; multi = 1.0;
            document.getElementById('start-avi').style.display='none'; document.getElementById('cashout-avi').style.display='block';
            const crashAt = (Math.random()*5 + 1.2).toFixed(2);
            aviInt = setInterval(() => {
                multi += 0.05;
                document.getElementById('multiplier').innerText = multi.toFixed(2) + "x";
                document.getElementById('plane').style.left = (multi * 20) + "px";
                if(multi >= crashAt) {
                    clearInterval(aviInt); isFlying = false;
                    document.getElementById('multiplier').innerText = "FLY AWAY!";
                    setTimeout(() => location.reload(), 2000);
                }
            }, 100);
        }

        function cashOutAviator() {
            if(!isFlying) return;
            clearInterval(aviInt); isFlying = false;
            const amt = parseFloat(document.getElementById('avi-amt').value), win = amt * multi;
            const bal = parseFloat(document.getElementById('u-bal').innerText);
            db.ref('users/'+loggedUser+'/wallet').set(bal + win).then(() => {
                showNotify("Won ₹" + win.toFixed(2));
                setTimeout(() => location.reload(), 1500);
            });
        }
        
        // Timer for Win Go
        setInterval(() => {
            let t = parseInt(document.getElementById('timer').innerText);
            document.getElementById('timer').innerText = (t <= 1) ? 15 : t - 1;
        }, 1000);
    </script>
</body>
</html>
