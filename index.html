<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #f39c12; --bg: #0d1117; --card: #1c2128; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .auth-container { padding: 40px 20px; max-width: 400px; margin: auto; }
        .auth-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { flex:1; padding: 12px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--primary); border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; margin-top: 10px; }
        #app { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-container">
        <h1 style="color:var(--primary); font-style: italic;">PANDYA BET</h1>
        <div class="auth-box">
            <div class="tabs">
                <div id="l-tab" class="tab active" onclick="toggleMode('login')">LOGIN</div>
                <div id="s-tab" class="tab" onclick="toggleMode('signup')">SIGN UP</div>
            </div>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
            <button id="main-btn" class="btn" onclick="handleAuth()">LOGIN NOW</button>
        </div>
    </div>

    <div id="app">
        <h1 style="color:var(--primary)">PANDYA BET LOBBY</h1>
        <div style="background:#222; padding:20px; border-radius:10px; border:1px solid var(--primary); margin-top:20px;">
            User ID: <span id="user-id"></span><br>
            Wallet: ₹1000.00
        </div>
        <button class="btn" onclick="location.reload()" style="margin-top:30px; max-width:200px; background:#333; color:white;">LOGOUT</button>
    </div>

    <script>
        // Ashish, ye config aapke project se 100% match hai
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let mode = 'login';

        function toggleMode(m) {
            mode = m;
            document.getElementById('l-tab').className = m === 'login' ? 'tab active' : 'tab';
            document.getElementById('s-tab').className = m === 'signup' ? 'tab active' : 'tab';
            document.getElementById('c-pass').style.display = m === 'signup' ? 'block' : 'none';
            document.getElementById('main-btn').innerText = m === 'login' ? 'LOGIN NOW' : 'CREATE ACCOUNT';
        }

        function handleAuth() {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            const cpw = document.getElementById('c-pass').value;

            if(!p || !pw) return alert("Bhai, khali mat chhodo!");

            if(mode === 'signup') {
                if(pw !== cpw) return alert("Password match nahi hua!");
                
                // SIGNUP LOGIC
                db.ref('users/' + p).set({
                    password: pw,
                    wallet: 1000
                }, (error) => {
                    if (error) {
                        alert("Galti: Rules check karo Firebase mein! " + error.message);
                    } else {
                        alert("Account Ban Gaya! Ab Login Karo.");
                        toggleMode('login');
                    }
                });
            } else {
                // LOGIN LOGIC
                db.ref('users/' + p).once('value').then((snap) => {
                    if(snap.exists() && snap.val().password === pw) {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        document.getElementById('user-id').innerText = p;
                    } else {
                        alert("Wrong Mobile Number or Password!");
                    }
                }).catch((e) => {
                    alert("Network Error: " + e.message);
                });
            }
        }
    </script>
</body>
</html>
