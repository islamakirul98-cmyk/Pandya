<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official OTP System</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c2128; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); max-width: 380px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 8px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #otp-section, #app-screen { display: none; }
        #recaptcha-container { margin: 10px auto; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h1 style="color:var(--gold); font-style: italic;">PANDYA BET</h1>
        
        <div id="number-section">
            <input type="number" id="phone" placeholder="+91 Mobile Number">
            <input type="password" id="pass" placeholder="Create Password">
            <div id="recaptcha-container"></div>
            <button class="btn" onclick="sendOTP()">SEND OTP</button>
        </div>

        <div id="otp-section">
            <p>Enter 6-Digit OTP sent to your phone</p>
            <input type="number" id="otp" placeholder="Enter OTP">
            <button class="btn" onclick="verifyOTP()">VERIFY & SIGNUP</button>
        </div>
    </div>

    <div id="app-screen" class="card">
        <h1 style="color:var(--gold)">WELCOME LOBBY</h1>
        <p>User: <span id="u-id"></span></p>
        <h2 style="border: 1px solid var(--gold); padding: 10px; border-radius: 10px;">Wallet: ₹1000.00</h2>
        <button class="btn" onclick="location.reload()" style="background:#333; color:white;">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Captcha Setup
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'normal',
            'callback': (response) => { console.log("Captcha Solved"); }
        });

        let confirmationResult;

        function sendOTP() {
            const p = document.getElementById('phone').value;
            if(!p || p.length < 10) return alert("Sahi number dalo (+91 ke saath)");

            // Number format thik karein (e.g. +919999999999)
            const phoneNumber = p.startsWith('+') ? p : '+91' + p;
            const appVerifier = window.recaptchaVerifier;

            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('number-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    alert("OTP Bhej Diya Gaya Hai!");
                }).catch((error) => {
                    alert("Galti: " + error.message);
                    location.reload(); 
                });
        }

        function verifyOTP() {
            const code = document.getElementById('otp').value;
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;

            confirmationResult.confirm(code).then((result) => {
                // OTP Sahi hai! Ab Database mein save karo
                db.ref('users/' + p).set({
                    password: pw,
                    wallet: 1000
                }).then(() => {
                    alert("Verification Successful!");
                    showDashboard(p);
                });
            }).catch((error) => {
                alert("Galat OTP!");
            });
        }

        function showDashboard(p) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('u-id').innerText = p;
        }
    </script>
</body>
</html>
