<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Fast Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1c2128; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 380px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #f39c12; color: #f39c12; border-radius: 8px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #f39c12; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #app-screen { display: none; }
        .loader { display: none; color: #f39c12; margin-top: 10px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:#f39c12; font-style: italic;">PANDYA BET</h1>
        <div class="box">
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            
            <button id="loginBtn" class="btn" onclick="doLogin()">LOGIN</button>
            <button id="signupBtn" class="btn" style="background:#333; color:white;" onclick="doSignup()">SIGN UP</button>
            
            <div id="status" class="loader">Connecting to Server...</div>
        </div>
    </div>

    <div id="app-screen">
        <h1 style="color:#f39c12">DASHBOARD</h1>
        <div class="box">
            <p style="font-size: 18px;">Welcome: <span id="display-id" style="color:#f39c12"></span></p>
            <h2 style="border: 1px solid #f39c12; padding: 10px; border-radius: 10px;">Wallet: ₹<span id="display-bal">0</span></h2>
            <button class="btn" style="background:#ff5252; color:white;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Auto-Login check
        window.onload = () => {
            const user = localStorage.getItem('pandya_user');
            if(user) showDashboard(user);
        };

        function setUI(loading) {
            document.getElementById('status').style.display = loading ? 'block' : 'none';
            document.getElementById('loginBtn').disabled = loading;
            document.getElementById('signupBtn').disabled = loading;
        }

        async function doSignup() {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            if(!p || !pw) return alert("Bhai details dalo!");

            setUI(true);
            db.ref('users/' + p).set({
                password: pw,
                wallet: 1000
            }).then(() => {
                setUI(false);
                alert("Signup Successful! Ab Login button dabao.");
            }).catch(e => {
                setUI(false);
                alert("Server Slow hai: " + e.message);
            });
        }

        async function doLogin() {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            if(!p || !pw) return alert("Details dalo!");

            setUI(true);
            db.ref('users/' + p).once('value').then((snap) => {
                setUI(false);
                if(snap.exists() && snap.val().password === pw) {
                    localStorage.setItem('pandya_user', p);
                    showDashboard(p);
                } else {
                    alert("ID ya Password galat hai!");
                }
            }).catch(() => {
                setUI(false);
                alert("Network Slow hai, phir se try karo!");
            });
        }

        function showDashboard(p) {
            db.ref('users/' + p).on('value', (snap) => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('display-id').innerText = p;
                document.getElementById('display-bal').innerText = snap.val().wallet;
            });
        }

        function logout() {
            localStorage.removeItem('pandya_user');
            location.reload();
        }
    </script>
</body>
</html>
