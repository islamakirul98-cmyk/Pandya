<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #f39c12; /* Gold color */
            --bg-overlay: rgba(0, 0, 0, 0.75); /* Dark transparent overlay */
            --card-bg: rgba(28, 33, 40, 0.9); /* Dark glassy card */
            --text-main: white;
        }

        body {
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Aapki bheji hui photo yahan set ki hai */
            background-image: url('https://replicate.delivery/xpbkg/O5fM68656iRe8khY7I01XfH26m0f0X3T9Y5F9Y4F9F1Y7Y1Y/output.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Dark overlay taaki text saaf dikhe */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-overlay);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            padding-top: 50px;
        }

        .logo {
            font-size: 38px;
            font-weight: bold;
            font-style: italic;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
        }

        .box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #444;
            max-width: 380px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); /* Glassy effect */
        }

        input {
            width: 90%;
            padding: 14px;
            margin: 12px 0;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #555;
            color: var(--primary);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.6);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .btn-toggle {
            background: #333;
            color: white;
            border: 1px solid #555;
            margin-top: 20px;
            font-size: 14px;
            padding: 12px;
        }

        #app-screen { display: none; text-align: center; }

        .dashboard-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 450px;
            margin: 50px auto auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .wallet-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            margin: 25px 0;
        }

        .wallet-bal {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
        }

        #status { display: none; color: var(--primary); margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <div class="logo">PANDYA BET</div>
            <div class="box">
                <h2 id="auth-title" style="color:white; margin-top:0;">LOGIN</h2>
                
                <input type="number" id="phone" placeholder="Mobile Number">
                <input type="password" id="pass" placeholder="Password">
                <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
                
                <button id="mainBtn" class="btn" onclick="handleAuth()">LOGIN NOW</button>
                
                <p id="toggleText" style="margin-top:20px; font-size:14px; color:#aaa;">Naya account banana hai?</p>
                <button id="toggleBtn" class="btn btn-toggle" onclick="toggleMode()">GO TO SIGNUP</button>
                
                <div id="status">Connecting to server...</div>
            </div>
        </div>

        <div id="app-screen">
            <div class="logo">PANDYA BET</div>
            <div class="dashboard-box">
                <h2 style="margin-top:0;">WELCOME TO LOBBY</h2>
                <p style="font-size: 18px; color: #ccc;">User ID: <span id="u-id" style="color:var(--primary); font-weight:bold;"></span></p>
                
                <div class="wallet-card">
                    <span style="font-size:14px; color:#aaa;">AVAILABLE BALANCE</span><br>
                    <span class="wallet-bal">₹ <span id="u-bal">0.00</span></span>
                </div>
                
                <p style="color: #888;">Aviator, Cricket Betting & Casino coming soon...</p>
                
                <button class="btn" style="background:#444; color:white; width:150px; margin-top:30px;" onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG (Already working) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isLogin = true;

        // Session check on refresh
        window.onload = () => {
            const user = localStorage.getItem('p_user');
            if(user) showDashboard(user);
        };

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'LOGIN' : 'SIGN UP';
            document.getElementById('mainBtn').innerText = isLogin ? 'LOGIN NOW' : 'CREATE ACCOUNT';
            document.getElementById('toggleBtn').innerText = isLogin ? 'GO TO SIGNUP' : 'GO TO LOGIN';
            document.getElementById('toggleText').innerText = isLogin ? 'Naya account banana hai?' : 'Pehle se account hai?';
            document.getElementById('c-pass').style.display = isLogin ? 'none' : 'block';
        }

        async function handleAuth() {
            const p = document.getElementById('phone').value.trim();
            const pw = document.getElementById('pass').value.trim();
            const cpw = document.getElementById('c-pass').value.trim();
            const status = document.getElementById('status');

            if(!p || !pw) return alert("Pehle details bharo bhai!");

            status.style.display = 'block';

            if(!isLogin) {
                // SIGNUP
                if(pw !== cpw) { status.style.display='none'; return alert("Password match nahi hua!"); }
                db.ref('users/' + p).set({ password: pw, wallet: 1000 })
                .then(() => { status.style.display='none'; alert("Signup Successful! Ab Login karein."); toggleMode(); });
            } else {
                // LOGIN
                db.ref('users/' + p).once('value').then((snap) => {
                    status.style.display='none';
                    if(snap.exists() && snap.val().password === pw) {
                        localStorage.setItem('p_user', p);
                        showDashboard(p);
                    } else { alert("ID ya Password galat hai!"); }
                });
            }
        }

        function showDashboard(p) {
            db.ref('users/' + p).on('value', (snap) => {
                if(snap.exists()) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app-screen').style.display = 'block';
                    document.getElementById('u-id').innerText = p;
                    document.getElementById('u-bal').innerText = parseFloat(snap.val().wallet).toFixed(2);
                }
            });
        }

        function logout() { localStorage.removeItem('p_user'); location.reload(); }
    </script>
</body>
</html>
