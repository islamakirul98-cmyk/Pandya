<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; --card: #1c2128; --red: #e74c3c; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        #auth-screen, #app-screen { display: none; }
        #auth-screen { height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 350px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 10px; outline: none; box-sizing: border-box; }
        
        /* --- REFRESH BUTTON SYSTEM --- */
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        .btn { 
            flex: 1; height: 50px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; display: flex; 
            align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        
        .login-btn { background: var(--gold); color: black; }
        .signup-btn { background: #333; color: white; border: 1px solid #444; }
        .btn:disabled { opacity: 0.8; cursor: not-allowed; }

        /* Refresh/Spinner Icon */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            display: none; /* Default Hide */
            animation: spin 0.8s linear infinite;
        }
        .login-btn .spinner { border-top: 3px solid black; border-color: rgba(0,0,0,0.1); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Notification */
        #custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 25px; border-radius: 8px; font-weight: bold; z-index: 3000; transition: 0.5s; }
        #custom-alert.show { top: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert">Message</div>

    <div id="auth-screen">
        <h1 style="color: var(--gold); font-style: italic; margin-bottom: 30px;">PANDYA BET</h1>
        <div class="auth-box">
            <h2 id="form-title" style="margin-top: 0; font-size: 16px; color: #888;">SECURE LOGIN</h2>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
            
            <div class="btn-container">
                <button class="btn login-btn" onclick="startProcess('login')" id="l-btn">
                    <span id="l-text">Login</span>
                    <div class="spinner" id="l-spinner"></div>
                </button>
                
                <button class="btn signup-btn" onclick="startProcess('signup')" id="s-btn">
                    <span id="s-text">Sign Up</span>
                    <div class="spinner" id="s-spinner"></div>
                </button>
            </div>
        </div>
    </div>

    <div id="app-screen">
        <h2 style="color:var(--gold); margin-top:50px;">DASHBOARD ACTIVE ✅</h2>
        <button class="btn signup-btn" style="width:150px; margin:auto;" onclick="localStorage.clear(); location.reload();">Logout</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showNotify(msg) {
            const a = document.getElementById('custom-alert');
            a.innerText = msg; a.classList.add('show');
            setTimeout(() => a.classList.remove('show'), 3000);
        }

        window.onload = () => {
            if(localStorage.getItem('p_user')) {
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('auth-screen').style.display = 'none';
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        };

        function startProcess(mode) {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            const cp = document.getElementById('c-pass');

            // Toggle logic for signup
            if(mode === 'signup' && cp.style.display === 'none') {
                cp.style.display = 'block';
                document.getElementById('form-title').innerText = "CREATE NEW ACCOUNT";
                return;
            }

            if(!p || !pw) return showNotify("Enter ID & Password!");

            // --- REFRESH ANIMATION START ---
            const btnId = mode === 'login' ? 'l' : 's';
            const btn = document.getElementById(btnId + '-btn');
            const text = document.getElementById(btnId + '-text');
            const spinner = document.getElementById(btnId + '-spinner');

            text.style.display = 'none'; // Hide Text
            spinner.style.display = 'block'; // Show Refresh Icon
            btn.disabled = true;

            // Artificial delay to show "Refreshing" effect
            setTimeout(() => {
                db.ref('users/'+p).once('value', s => {
                    if(mode === 'login') {
                        if(s.exists() && s.val().password === pw) {
                            localStorage.setItem('p_user', p);
                            location.reload();
                        } else {
                            showNotify("Invalid Details!");
                            resetBtn(btnId);
                        }
                    } else {
                        if(s.exists()) {
                            showNotify("Already Registered!");
                            resetBtn(btnId);
                        } else {
                            db.ref('users/'+p).set({password:pw, wallet:25}).then(() => {
                                localStorage.setItem('p_user', p);
                                location.reload();
                            });
                        }
                    }
                });
            }, 1500);
        }

        function resetBtn(id) {
            document.getElementById(id + '-text').style.display = 'block';
            document.getElementById(id + '-spinner').style.display = 'none';
            document.getElementById(id + '-btn').disabled = false;
        }
    </script>
</body>
</html>
