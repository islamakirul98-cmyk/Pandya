<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official App</title>
    <style>
        :root { --primary: #f39c12; --bg: #0d1117; --card: #1c2128; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* Auth Screen (Login/Signup) */
        #auth-screen { padding: 50px 20px; max-width: 400px; margin: auto; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { flex:1; padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }
        
        /* Main Layout */
        #main-app { display: none; }
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); font-style: italic; }
        .bal-box { background: #222; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--primary); font-weight: bold; }

        /* Lobby & Games */
        #lobby { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        .game-icon { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #30363d; cursor: pointer; }
        .game-img { width: 100%; border-radius: 10px; margin-bottom: 8px; }
        .game-page { display: none; padding: 15px; max-width: 500px; margin: auto; }
        
        /* Inputs & Buttons */
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: var(--primary); border-radius: 5px; text-align: center; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-bottom: 15px; cursor: pointer; float: left; }
        
        /* Game Visuals */
        #screen { height: 200px; background: #000; border-radius: 10px; position: relative; overflow: hidden; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: var(--primary); }
        #plane { position: absolute; bottom: 20px; left: 20px; font-size: 35px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:var(--primary); font-style: italic;">PANDYA BET</h1>
        <div class="auth-box">
            <div class="auth-tabs">
                <div id="login-tab" class="tab active" onclick="toggleAuth('login')">LOGIN</div>
                <div id="signup-tab" class="tab" onclick="toggleAuth('signup')">SIGN UP</div>
            </div>
            
            <div id="auth-form">
                <input type="number" id="phone" placeholder="Mobile Number">
                <input type="password" id="pass" placeholder="Password">
                <button id="auth-btn" class="btn" onclick="handleAuth()">LOGIN NOW</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">PANDYA BET</div>
            <div class="bal-box">₹ <span id="wallet">1000.00</span></div>
        </header>

        <div id="lobby">
            <div class="game-icon" onclick="openGame('aviator-page')">
                <img src="https://img.freepik.com/premium-vector/jet-plane-flying-sky-logo-design-vector_605910-142.jpg" class="game-img">
                <div>AVIATOR</div>
            </div>
            <div class="game-icon" onclick="openGame('color-page')">
                <img src="https://img.freepik.com/free-vector/colorful-abstract-background_23-2148461457.jpg" class="game-img">
                <div>COLOR TRADING</div>
            </div>
            <button class="btn" onclick="logout()" style="grid-column: span 2; background:#333; color:white; margin-top:20px;">LOGOUT</button>
        </div>

        <div id="aviator-page" class="game-page">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <div style="clear:both" class="card">
                <div id="screen"><div id="multiplier">1.00x</div><div id="plane">✈️</div></div>
                <input type="number" id="jetAmt" value="50">
                <button id="jetBtn" class="btn" onclick="startJet()">START BET</button>
            </div>
        </div>

        <div id="color-page" class="game-page">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <div style="clear:both" class="card">
                <h3 id="colorRes">Pick Red or Green</h3>
                <button class="btn" style="background:red; margin-bottom:10px" onclick="playColor('RED')">RED</button>
                <button class="btn" style="background:green" onclick="playColor('GREEN')">GREEN</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let mode = 'login';

        // --- AUTH LOGIC ---
        function toggleAuth(type) {
            mode = type;
            document.getElementById('login-tab').className = type === 'login' ? 'tab active' : 'tab';
            document.getElementById('signup-tab').className = type === 'signup' ? 'tab active' : 'tab';
            document.getElementById('auth-btn').innerText = type === 'login' ? 'LOGIN NOW' : 'CREATE ACCOUNT';
        }

        function handleAuth() {
            let p = document.getElementById('phone').value;
            let pw = document.getElementById('pass').value;

            if(!p || !pw) return alert("Details bhariye bhai!");

            if(mode === 'signup') {
                localStorage.setItem(p, pw);
                alert("Account Ban Gaya! Ab Login karein.");
                toggleAuth('login');
            } else {
                let savedPass = localStorage.getItem(p);
                if(savedPass && savedPass === pw) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                } else {
                    alert("Incorrect ID or Password!");
                }
            }
        }

        function logout() { location.reload(); }

        // --- GAME NAVIGATION ---
        function openGame(id) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
        function goHome() {
            document.querySelectorAll('.game-page').forEach(p => p.style.display = 'none');
            document.getElementById('lobby').style.display = 'grid';
        }

        // --- JETX LOGIC ---
        function startJet() {
            let amt = parseFloat(document.getElementById('jetAmt').value);
            if(amt > balance) return alert("Paisa nahi hai!");
            balance -= amt; updateW();
            let count = 1.00;
            let limit = (1 + Math.random() * 3).toFixed(2);
            let btn = document.getElementById('jetBtn');
            btn.innerText = "CASH OUT"; btn.style.background = "#00c853";
            
            let timer = setInterval(() => {
                count += 0.01;
                document.getElementById('multiplier').innerText = count.toFixed(2) + "x";
                if(count >= limit) {
                    clearInterval(timer);
                    alert("CRASHED!");
                    resetJet();
                }
            }, 100);

            btn.onclick = () => {
                clearInterval(timer);
                balance += (amt * count); updateW();
                alert("Win! ₹" + (amt * count).toFixed(2));
                resetJet();
            };
        }

        function resetJet() {
            document.getElementById('jetBtn').innerText = "START BET";
            document.getElementById('jetBtn').style.background = "var(--primary)";
            document.getElementById('jetBtn').onclick = startJet;
            document.getElementById('multiplier').innerText = "1.00x";
        }

        function playColor(c) {
            if(balance < 20) return alert("Paisa nahi hai!");
            balance -= 20;
            let win = Math.random() > 0.5 ? 'RED' : 'GREEN';
            if(c === win) { balance += 40; alert("You Won!"); }
            else { alert("You Lost! Result: " + win); }
            updateW();
        }

        function updateW() { document.getElementById('wallet').innerText = balance.toFixed(2); }
    </script>
</body>
</html>
