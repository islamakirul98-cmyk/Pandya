<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c2128; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); max-width: 380px; margin: 50px auto; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        .logo { font-size: 35px; font-weight: bold; color: var(--gold); font-style: italic; margin-bottom: 20px; }
        input { width: 90%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 18px; }
        .tab-btn { background: none; border: none; color: #888; font-weight: bold; cursor: pointer; padding: 10px 20px; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        #app-screen { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <div class="logo">PANDYA BET</div>
        <div style="margin-bottom:20px;">
            <button class="tab-btn active" id="l-tab" onclick="setMode('login')">LOGIN</button>
            <button class="tab-btn" id="s-tab" onclick="setMode('signup')">SIGN UP</button>
        </div>

        <input type="number" id="phone" placeholder="Mobile Number">
        <input type="password" id="pass" placeholder="Password">
        <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">

        <button class="btn" onclick="handleAuth()" id="main-btn">LOGIN NOW</button>
    </div>

    <div id="app-screen" class="card">
        <div class="logo">PANDYA BET</div>
        <h3>DASHBOARD ACTIVE ✅</h3>
        <div style="background:#000; padding:20px; border-radius:15px; border:1px dashed var(--gold); margin:20px 0;">
            <p style="color:#888; margin:0;">User ID: <span id="u-id" style="color:white;"></span></p>
            <h1 style="color:var(--gold); margin:10px 0;">₹ <span id="u-bal">0.00</span></h1>
        </div>
        <button class="btn" style="background:#333; color:white;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mode = 'login';

        function setMode(m) {
            mode = m;
            document.getElementById('l-tab').className = m === 'login' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('s-tab').className = m === 'signup' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('c-pass').style.display = m === 'signup' ? 'block' : 'none';
            document.getElementById('main-btn').innerText = m === 'login' ? 'LOGIN NOW' : 'CREATE ACCOUNT';
        }

        function handleAuth() {
            const p = document.getElementById('phone').value;
            const pw = document.getElementById('pass').value;
            const cpw = document.getElementById('c-pass').value;

            if(!p || !pw) return alert("Pehle details bharo!");

            if(mode === 'signup') {
                if(pw !== cpw) return alert("Password match nahi hua!");
                
                // Pehle check karo ki number already registered toh nahi hai
                db.ref('users/' + p).once('value').then(snap => {
                    if(snap.exists()) {
                        alert("Bhai ye number pehle se hai! Login karo.");
                    } else {
                        db.ref('users/' + p).set({ password: pw, wallet: 1000.00 })
                        .then(() => { alert("Account Ban Gaya! Ab Login Karo."); setMode('login'); });
                    }
                });
            } else {
                db.ref('users/' + p).once('value').then(snap => {
                    if(snap.exists() && snap.val().password === pw) {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('app-screen').style.display = 'block';
                        document.getElementById('u-id').innerText = p;
                        document.getElementById('u-bal').innerText = parseFloat(snap.val().wallet).toFixed(2);
                    } else {
                        alert("Galat Details!");
                    }
                });
            }
        }
    </script>
</body>
</html>
