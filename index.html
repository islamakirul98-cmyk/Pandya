<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; --card: #1c2128; --red: #e74c3c; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Anti-Flash Screens */
        #auth-screen, #app-screen { display: none; }
        #auth-screen { height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 350px; }
        
        #app-screen { min-height: 100vh; }
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 10px; outline: none; box-sizing: border-box; }
        
        /* --- LOADING BUTTON STYLE --- */
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Spinner Icon */
        .spinner { 
            width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.3); border-top: 3px solid black; 
            border-radius: 50%; display: none; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Notification */
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 15px 30px;
            border-radius: 10px; font-weight: bold; z-index: 3000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: 0.5s ease;
        }
        #custom-alert.show { top: 20px; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .game-item { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; cursor: pointer; }
        .game-window { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert">Message here!</div>

    <div id="auth-screen">
        <h1 style="color: var(--gold); font-style: italic; margin-bottom: 30px;">PANDYA BET</h1>
        <div class="auth-box">
            <h2 id="auth-title">LOGIN</h2>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
            
            <button class="btn" onclick="handleAuth()" id="main-btn">
                <span id="btn-text">Login Now</span>
                <div class="spinner" id="btn-loader"></div>
            </button>
            
            <p onclick="toggleAuth()" style="color:#888; margin-top:20px; cursor:pointer;" id="toggle-text">Don't have an account? Sign Up</p>
        </div>
    </div>

    <div id="app-screen">
        <div class="header">
            <div style="font-weight: bold; color: var(--gold);">PANDYA BET</div>
            <div style="background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold;">
                ₹ <span id="u-bal">0.00</span>
            </div>
        </div>
        <div id="lobby">
            <div class="game-grid">
                <div class="game-item" onclick="openGame('aviator-game')" style="border-bottom: 4px solid var(--red);">
                    <span style="font-size:40px; display:block; margin-bottom:10px;">🚀</span><span style="font-weight:bold;">AVIATOR</span>
                </div>
                <div class="game-item" onclick="openGame('color-game')" style="border-bottom: 4px solid var(--gold);">
                    <span style="font-size:40px; display:block; margin-bottom:10px;">🎨</span><span style="font-weight:bold;">WIN GO</span>
                </div>
            </div>
            <button class="btn" style="background:#222; color:#888; width: 150px; margin: 50px auto 0;" onclick="userLogout()">Logout</button>
        </div>

        <div class="game-window" id="aviator-game">
            <button onclick="backToLobby()" style="float:left; background:none; border:none; color:white; cursor:pointer;">← Back</button>
            <h2 style="color:var(--red);">AVIATOR</h2>
            <p>Game is ready!</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mode = 'login', loggedInUser = "";

        function showNotify(msg) {
            const alertBox = document.getElementById('custom-alert');
            alertBox.innerText = msg; alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        const checkSession = () => {
            const u = localStorage.getItem('p_user');
            if(u) {
                loggedInUser = u;
                db.ref('users/'+u).on('value', s => {
                    if(s.exists()) {
                        document.getElementById('u-bal').innerText = parseFloat(s.val().wallet).toFixed(2);
                        document.getElementById('app-screen').style.display = 'block';
                        document.getElementById('auth-screen').style.display = 'none';
                    } else { userLogout(); }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        };
        window.onload = checkSession;

        function toggleAuth() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('auth-title').innerText = mode.toUpperCase();
            document.getElementById('c-pass').style.display = (mode === 'signup') ? 'block' : 'none';
            document.getElementById('main-btn').querySelector('#btn-text').innerText = (mode === 'signup') ? 'Create Account' : 'Login Now';
        }

        function handleAuth() {
            const p = document.getElementById('phone').value, pw = document.getElementById('pass').value;
            const btn = document.getElementById('main-btn');
            const loader = document.getElementById('btn-loader');
            const btnText = document.getElementById('btn-text');

            if(!p || !pw) return showNotify("Please fill all details!");

            // --- START LOADING ---
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = "Verifying...";

            // Thoda delay taaki loading spinner dikhe
            setTimeout(() => {
                if(mode === 'signup') {
                    // Signup Logic
                    db.ref('users/'+p).set({password:pw, wallet:20}).then(() => {
                        localStorage.setItem('p_user', p);
                        location.reload(); 
                    });
                } else {
                    // Login Logic
                    db.ref('users/'+p).once('value').then(s => {
                        if(s.exists() && s.val().password === pw) {
                            localStorage.setItem('p_user', p);
                            checkSession();
                        } else {
                            showNotify("Invalid ID or Password!");
                            // Stop Loading on error
                            btn.disabled = false;
                            loader.style.display = 'none';
                            btnText.innerText = (mode === 'login') ? "Login Now" : "Create Account";
                        }
                    });
                }
            }, 1500); 
        }

        function userLogout() { localStorage.removeItem('p_user'); location.reload(); }
        function openGame(id) { document.getElementById('lobby').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
        function backToLobby() { document.querySelectorAll('.game-window').forEach(w=>w.style.display='none'); document.getElementById('lobby').style.display = 'block'; }
    </script>
</body>
</html>
