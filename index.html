<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDYA BET - Official Aviator</title>
    <style>
        :root { --main: #cb011a; --bg: #000; --panel: #1b1c1d; --gold: #f39c12; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header & Balance */
        header { background: #141516; padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .logo { color: var(--main); font-weight: 900; font-size: 1.2rem; font-style: italic; }
        .bal-btn { background: #28a745; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }

        /* History Bar */
        .history { background: #141516; padding: 8px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #333; }
        .h-item { background: #2c2d2e; padding: 2px 10px; border-radius: 10px; font-size: 12px; color: #9c27b0; border: 1px solid #444; }

        /* Game Screen */
        #game-view {
            position: relative; width: 100%; height: 260px; background: #050505;
            overflow: hidden; border-bottom: 2px solid #222;
        }
        #mult-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 55px; font-weight: 900; z-index: 10;
        }
        #plane-icon { position: absolute; bottom: 20px; left: 20px; font-size: 40px; z-index: 5; transition: 0.1s linear; }
        
        /* Betting Panel */
        .bet-area { background: var(--panel); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-card { background: #252627; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        input { width: 80%; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; text-align: center; }
        .action-btn { width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-bet { background: #28a745; color: white; }
        .btn-cash { background: #ffc107; color: black; }

        /* Live Bets List */
        .live-bets { padding: 10px; background: #141516; font-size: 12px; }
        .bet-row { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #222; color: #aaa; }
        .win-row { color: #28a745; }
    </style>
</head>
<body>

<header>
    <div class="logo">PANDYA BET</div>
    <div class="bal-btn">₹<span id="u-bal">1000.00</span></div>
</header>

<div class="history" id="h-bar">
    <div class="h-item">1.52x</div><div class="h-item">2.10x</div><div class="h-item" style="color:#3f51b5">10.4x</div>
</div>

<div id="game-view">
    <div id="mult-display">1.00x</div>
    <div id="plane-icon">✈️</div>
    <canvas id="chart" style="position:absolute; top:0; left:0;"></canvas>
</div>

<div class="bet-area">
    <div class="bet-card">
        <input type="number" id="amt1" value="100">
        <button id="btn1" class="action-btn btn-bet" onclick="placeBet()">BET</button>
    </div>
    <div class="bet-card">
        <input type="number" id="amt2" value="200">
        <button class="action-btn btn-bet">BET</button>
    </div>
</div>

<div class="live-bets">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
        <span>All Bets</span> <span id="online-count">Online: 452</span>
    </div>
    <div id="bet-list">
        </div>
</div>

<script>
    let bal = 1000, running = false, m = 1.00, time = 0, loop;
    const plane = document.getElementById('plane-icon');
    const display = document.getElementById('mult-display');

    function placeBet() {
        if(running) { cashout(); return; }
        let a = parseFloat(document.getElementById('amt1').value);
        if(a > bal) return alert("Paisa nahi hai!");
        
        bal -= a; updateUI();
        running = true; m = 1.00; time = 0;
        document.getElementById('btn1').innerText = "CASH OUT";
        document.getElementById('btn1').className = "action-btn btn-cash";
        
        let crash = (1 + Math.random() * 4).toFixed(2);
        
        loop = setInterval(() => {
            time += 0.05;
            m = Math.pow(1.07, time);
            display.innerText = m.toFixed(2) + "x";
            display.style.color = "white";

            let x = time * 18; let y = Math.pow(time, 1.4) * 6;
            plane.style.left = (20 + x) + "px";
            plane.style.bottom = (20 + y) + "px";

            if(m >= crash) {
                clearInterval(loop);
                running = false;
                display.innerText = "FLEW AWAY!";
                display.style.color = "#cb011a";
                plane.style.opacity = "0";
                addHistory(crash);
                setTimeout(reset, 3000);
            }
        }, 60);
        generateFakeBets();
    }

    function cashout() {
        if(!running) return;
        clearInterval(loop);
        let win = parseFloat(document.getElementById('amt1').value) * m;
        bal += win;
        alert("CASHED OUT: ₹" + win.toFixed(2));
        reset();
    }

    function reset() {
        running = false;
        document.getElementById('btn1').innerText = "BET";
        document.getElementById('btn1').className = "action-btn btn-bet";
        plane.style.left = "20px"; plane.style.bottom = "20px"; plane.style.opacity = "1";
        display.innerText = "WAITING...";
        updateUI();
    }

    function updateUI() { document.getElementById('u-bal').innerText = bal.toFixed(2); }
    
    function addHistory(val) {
        let div = document.createElement('div');
        div.className = "h-item"; div.innerText = val + "x";
        document.getElementById('h-bar').prepend(div);
    }

    function generateFakeBets() {
        const names = ['Rohan', 'Amit', 'Sufiyan', 'Pandya', 'Gamer'];
        let html = '';
        for(let i=0; i<5; i++) {
            let user = names[Math.floor(Math.random()*names.length)];
            html += `<div class="bet-row"><span>${user}***</span> <span>₹${(Math.random()*500).toFixed(0)}</span></div>`;
        }
        document.getElementById('bet-list').innerHTML = html;
    }
</script>

</body>
</html>
