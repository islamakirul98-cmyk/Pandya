<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #f39c12; --bg: #0d1117; --card: #1c2128; --success: #00c853; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* Auth Screens */
        #auth-screen { padding: 40px 20px; max-width: 400px; margin: auto; }
        .auth-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { flex:1; padding: 12px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: var(--primary); border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--primary); color: #000; margin-top: 10px; }
        
        /* Main App Layout */
        #main-app { display: none; }
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); font-style: italic; }
        .bal-box { background: #222; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--primary); font-weight: bold; }

        /* Lobby Grid */
        #lobby { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        .game-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #30363d; cursor: pointer; }
        .game-img { width: 100%; border-radius: 10px; margin-bottom: 8px; }
        
        /* Game Sections */
        .game-page { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-bottom: 15px; cursor: pointer; float: left; }
        #screen { height: 200px; background: #000; border-radius: 10px; position: relative; overflow: hidden; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:var(--primary); font-style: italic; letter-spacing: 2px;">PANDYA BET</h1>
        <div class="auth-box">
            <div class="tabs">
                <div id="l-tab" class="tab active" onclick="setAuth('login')">LOGIN</div>
                <div id="s-tab" class="tab" onclick="setAuth('signup')">SIGN UP</div>
            </div>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
            <button id="auth-btn" class="btn" onclick="runAuth()">LOGIN NOW</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">PANDYA BET</div>
            <div class="bal-box">₹ <span id="u-wallet">1000.00</span></div>
        </header>

        <div id="lobby">
            <div class="game-card" onclick="openGame('aviator-box')">
                <img src="https://img.freepik.com/premium-vector/jet-plane-flying-sky-logo-design-vector_605910-142.jpg" class="game-img">
                <div>AVIATOR</div>
            </div>
            <div class="game-card" onclick="openGame('color-box')">
                <img src="https://img.freepik.com/free-vector/colorful-abstract-background_23-2148461457.jpg" class="game-img">
                <div>COLOR TRADING</div>
            </div>
            <button class="btn" onclick="logout()" style="grid-column: span 2; background:#333; color:white;">LOGOUT</button>
        </div>

        <div id="aviator-box" class="game-page">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <div style="clear:both" class="auth-box">
                <div id="screen"><div id="multiplier">1.00x</div></div>
                <button class="btn" onclick="alert('Round starting soon!')">BET NEXT ROUND</button>
            </div>
        </div>

        <div id="color-box" class="game-page">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <div style="clear:both" class="auth-box">
                <h3 id="resText">Pick Color</h3>
                <button class="btn" style="background:red" onclick="alert('Red Bet Placed!')">RED</button>
                <button class="btn" style="background:green; margin-top:10px;" onclick="alert('Green Bet Placed!')">GREEN</button>
            </div>
        </div>
    </div>
