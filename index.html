<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandya Bet - Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0b0e14; --card: #1c2128; --red: #e74c3c; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Anti-Flash */
        #auth-screen, #app-screen { display: none; }
        #auth-screen { height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 350px; }
        
        #app-screen { min-height: 100vh; }
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 10px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .game-item { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; cursor: pointer; }
        
        /* Deposit/Withdraw Sections */
        .wallet-actions { display: flex; gap: 10px; padding: 0 20px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid var(--gold); }
        
        .game-window { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Notification */
        #custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; z-index: 3000; transition: 0.5s ease; }
        #custom-alert.show { top: 20px; }
        
        .qr-img { width: 200px; height: 200px; background: white; margin: 10px auto; border-radius: 10px; }
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.3); border-top: 3px solid black; border-radius: 50%; display: none; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="custom-alert">Message here!</div>

    <div id="auth-screen">
        <h1 style="color: var(--gold); font-style: italic;">PANDYA BET</h1>
        <div class="auth-box">
            <h2 id="auth-title">LOGIN</h2>
            <input type="number" id="phone" placeholder="Mobile Number">
            <input type="password" id="pass" placeholder="Password">
            <input type="password" id="c-pass" placeholder="Confirm Password" style="display:none;">
            <button class="btn" onclick="handleAuth()" id="main-btn">
                <span id="btn-text">Login Now</span>
                <div class="spinner" id="btn-loader"></div>
            </button>
            <p onclick="toggleAuth()" style="color:#888; margin-top:20px; cursor:pointer;" id="toggle-text">Sign Up</p>
        </div>
    </div>

    <div id="app-screen">
        <div class="header">
            <div style="font-weight: bold; color: var(--gold);">PANDYA BET</div>
            <div style="background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold;">
                ₹ <span id="u-bal">0.00</span>
            </div>
        </div>

        <div id="lobby">
            <div class="wallet-actions">
                <div class="action-btn" style="background: var(--green); color: black;" onclick="openGame('deposit-page')">DEPOSIT</div>
                <div class="action-btn" style="background: var(--red); color: white;" onclick="openGame('withdraw-page')">WITHDRAW</div>
            </div>

            <div class="game-grid">
                <div class="game-item" onclick="openGame('aviator-game')">🚀<br>AVIATOR</div>
                <div class="game-item" onclick="openGame('color-game')">🎨<br>WIN GO</div>
            </div>
            <button class="btn" style="background:#222; color:#888; width: 120px; margin: 50px auto;" onclick="userLogout()">Logout</button>
        </div>

        <div class="game-window" id="deposit-page">
            <button onclick="backToLobby()" style="float:left; background:none; border:none; color:white;">← Back</button>
            <h2>DEPOSIT MONEY</h2>
            <div class="qr-img">
                <p style="color:black; padding-top:70px;">QR CODE HERE</p>
            </div>
            <p style="font-size:12px; color:var(--gold);">Pay on QR and enter UTR/Ref No. below</p>
            <input type="number" id="dep-amount" placeholder="Amount">
            <input type="text" id="dep-utr" placeholder="Enter 12-digit UTR No.">
            <button class="btn" style="background:var(--green); color:black;" onclick="requestDeposit()">SUBMIT REQUEST</button>
        </div>

        <div class="game-window" id="withdraw-page">
            <button onclick="backToLobby()" style="float:left; background:none; border:none; color:white;">← Back</button>
            <h2>WITHDRAW MONEY</h2>
            <input type="number" id="wit-amount" placeholder="Amount">
            <input type="text" id="wit-upi" placeholder="Enter your UPI ID">
            <button class="btn" style="background:var(--red); color:white;" onclick="requestWithdraw()">WITHDRAW NOW</button>
        </div>
        
        <div class="game-window" id="aviator-game"><h2>AVIATOR GAME</h2><button onclick="backToLobby()" class="btn">Back</button></div>
        <div class="game-window" id="color-game"><h2>WIN GO</h2><button onclick="backToLobby()" class="btn">Back</button></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAcG9CR4x8SEngX01Rte_u8i6_k3Z18UkI",
            authDomain: "pandya-bet.firebaseapp.com",
            databaseURL: "https://pandya-bet-default-rtdb.firebaseio.com",
            projectId: "pandya-bet",
            storageBucket: "pandya-bet.firebasestorage.app",
            messagingSenderId: "145616340494",
            appId: "1:145616340494:web:16f4294e77a7c89fb21e5f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let loggedInUser = "";

        function showNotify(msg) {
            const alertBox = document.getElementById('custom-alert');
            alertBox.innerText = msg; alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        const checkSession = () => {
            const u = localStorage.getItem('p_user');
            if(u) {
                loggedInUser = u;
                db.ref('users/'+u).on('value', s => {
                    if(s.exists()) {
                        document.getElementById('u-bal').innerText = parseFloat(s.val().wallet).toFixed(2);
                        document.getElementById('app-screen').style.display = 'block';
                        document.getElementById('auth-screen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        };
        window.onload = checkSession;

        function handleAuth() {
            // ... (Aapka purana Login/Signup code yahan rahega)
            const p = document.getElementById('phone').value;
            localStorage.setItem('p_user', p);
            checkSession();
        }

        function openGame(id) {
            document.getElementById('lobby').style.display = 'none';
            document.querySelectorAll('.game-window').forEach(w => w.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function backToLobby() {
            document.querySelectorAll('.game-window').forEach(w => w.style.display = 'none');
            document.getElementById('lobby').style.display = 'block';
        }

        // --- WALLET SYSTEMS ---
        function requestDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const utr = document.getElementById('dep-utr').value;
            if(!amt || !utr) return showNotify("All fields required!");
            
            db.ref('deposit_requests').push({
                user: loggedInUser,
                amount: amt,
                utr: utr,
                status: 'pending'
            }).then(() => {
                showNotify("Request Sent! Wait 10 mins.");
                backToLobby();
            });
        }

        function requestWithdraw() {
            const amt = parseFloat(document.getElementById('wit-amount').value);
            const upi = document.getElementById('wit-upi').value;
            const bal = parseFloat(document.getElementById('u-bal').innerText);
            
            if(amt > bal || amt < 100) return showNotify("Min ₹100 required!");
            
            db.ref('withdraw_requests').push({
                user: loggedInUser,
                amount: amt,
                upi: upi,
                status: 'pending'
            }).then(() => {
                db.ref('users/'+loggedInUser+'/wallet').set(bal - amt);
                showNotify("Withdrawal Request Sent!");
                backToLobby();
            });
        }

        function userLogout() { localStorage.removeItem('p_user'); location.reload(); }
    </script>
</body>
</html>
